name: Dependabot Auto Release

on:
  pull_request:
    types: [closed]

jobs:
  check-and-release:
    # Only run if PR was merged and created by dependabot
    if: github.event.pull_request.merged == true && github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check recent dependabot merges
        id: check
        run: |
          # Count dependabot commits in the last 24 hours
          SINCE=$(date -u -d '24 hours ago' +"%Y-%m-%dT%H:%M:%SZ")
          DEPENDABOT_COMMITS=$(git log --since="$SINCE" --author="dependabot" --oneline | wc -l)

          echo "dependabot_commits=$DEPENDABOT_COMMITS" >> $GITHUB_OUTPUT
          echo "Found $DEPENDABOT_COMMITS dependabot commits in last 24 hours"

      - name: Trigger release
        if: steps.check.outputs.dependabot_commits >= 3
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: 'main',
              inputs: {
                version_bump: 'patch',
                release_type: 'release',
                release_notes: `Dependency updates batch release\n\nThis release includes ${${{ steps.check.outputs.dependabot_commits }}} dependency updates merged automatically by Dependabot.`
              }
            })

      - name: Comment on PR (release triggered)
        if: steps.check.outputs.dependabot_commits >= 3
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Auto-release triggered! This dependency update (along with ${{ steps.check.outputs.dependabot_commits }} others) will be included in the next patch release.'
            })

      - name: Comment on PR (no release yet)
        if: steps.check.outputs.dependabot_commits < 3
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Dependency updated. Auto-release will trigger after 3+ dependency updates within 24 hours.'
            })
