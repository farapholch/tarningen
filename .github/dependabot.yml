version: 2
updates:
  # NPM dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
    groups:
      # Group TypeScript types together to avoid compatibility issues
      typescript-types:
        patterns:
          - "@types/*"
          - "undici-types"
    ignore:
      # Ignore major @types/node updates - too risky for auto-merge
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # Pin TypeScript to 5.x: @rocket.chat/apps-engine's rc-apps CLI
      # generates tsconfig.rc.json with moduleResolution=node10, which
      # TS 6.0 rejects. Re-evaluate when apps-engine supports TS 6.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "ci"


